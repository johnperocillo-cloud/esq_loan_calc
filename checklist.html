<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requirements Checklist — Loan Officer Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="navbar-root"></div>

<div class="wrap">

  <div class="flex-between" style="margin:20px 0 18px;">
    <div>
      <span class="eyebrow">Requirements Checklist</span>
      <h1 style="font-size:22px;">Document tracking, per client</h1>
    </div>
  </div>

  <div class="panel" style="margin-bottom:20px;">
    <div class="field-row-3">
      <div class="field" style="margin-bottom:0;">
        <label for="clientSelect">Client</label>
        <select id="clientSelect"></select>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label for="checklistSearch">Search</label>
        <input type="search" id="checklistSearch" placeholder="🔎 Search requirements or notes…">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label for="checklistFilterSelect">Filter</label>
        <select id="checklistFilterSelect">
          <option value="all">All items</option>
          <option value="pending">Pending</option>
          <option value="completed">Verified</option>
          <option value="incomplete">Incomplete</option>
          <option value="rejected">Rejected</option>
          <option value="basic">Basic Documents</option>
          <option value="banking">Banking Documents</option>
          <option value="business">Business Documents</option>
          <option value="verification">Business Verification</option>
          <option value="insurance">Insurance</option>
          <option value="submission">Submission</option>
        </select>
      </div>
    </div>
  </div>

  <div id="noClientState" class="panel empty-state" style="display:none;">
    <div class="big-icon">📋</div>
    <p>No clients yet — add one from Client Manager to start tracking requirements.</p>
    <a href="clients.html" class="btn btn-primary">👥 Go to Client Manager</a>
  </div>

  <div id="checklistWorkspace" style="display:none;">
    <div class="panel" style="margin-bottom:20px;" id="progressTrackerBox"></div>

    <div class="panel">
      <div class="flex-between" style="margin-bottom:14px;">
        <h2 style="margin:0;">Document Requirements</h2>
        <div class="row-actions">
          <button class="btn btn-sm" id="pdfBtn">⇩ Download PDF</button>
          <button class="btn btn-sm" id="printChecklistBtn">🖶 Print</button>
        </div>
      </div>
      <div id="checklistContainer"></div>
    </div>
  </div>

  <footer class="note">Checking documents for one client never affects another — each checklist is independent.</footer>
</div>

<script src="js/storage.js"></script>
<script src="js/checklist-schema.js"></script>
<script src="js/utils.js"></script>
<script src="js/navbar.js"></script>
<script src="js/checklist-ui.js"></script>
<script src="js/pdf.js"></script>
<script src="js/checklist-page.js"></script>
</body>
</html>
